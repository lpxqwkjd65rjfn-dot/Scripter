global:
  # HTTP marker the probe HTTP server returns to prove identity
  http_probe_path: "/probe"
  http_probe_marker_header: "X-Probe"
  http_probe_marker_value: "ok"
  https_probe_enabled: true

  # TCP probing
  tcp_ports: [443, 80]
  tcp_timeout_seconds: 6
  tcp_stability_attempts: 3   # repeated probes on the primary port
  tcp_stability_required: 2   # min successes out of attempts

  # HTTP probing
  http_timeout_seconds: 8
  http_retries: 1

  # ICMP
  icmp_enabled: true
  icmp_count: 3

  # Sanity guards
  latency_max_ms: 2000
  inter_stage_jitter_seconds: 0.3

  # Account-protection: trip after N consecutive auth errors
  killswitch_consecutive_auth_errors: 3

  # Provider-level circuit breaker on 429/5xx/network errors
  circuit_failure_threshold: 5
  circuit_reset_seconds: 1800

  # Polite UA — replace contact with your real one
  polite_user_agent: "rkn-probe/1.0 (+contact: you@example.com)"

  state_file: "state.json"

# ---------------------------------------------------------------
# Default per-provider safety knobs (override per provider as needed)
#   min_interval_seconds      base spacing between API ops
#   max_ops_per_hour          rolling hour cap
#   max_ops_per_day           rolling day cap (NEW — primary anti-ban guard)
#   jitter_pct                +/- jitter on min_interval (0..1)
#   backoff_base_seconds      base for exp backoff on errors
#   backoff_cap_seconds       cap for exp backoff
#   post_release_cooldown_seconds  extra wait after each IP release
#   api_retry_attempts        retries on 429/5xx/network in request()
#   api_retry_base_seconds    backoff base for those retries
# ---------------------------------------------------------------

